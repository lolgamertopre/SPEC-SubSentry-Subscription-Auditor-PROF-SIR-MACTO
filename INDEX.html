<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SubSentry — Subscription Auditor</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="sheesh.css" rel="stylesheet"/>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div>
        <h1>SubSentry</h1>
        <p>subscription auditor</p>
      </div>
    </div>
    <span class="header-tag">BUDGET GUARD</span>
  </header>

  <div class="dashboard">
    <div class="metric burn">
      <div class="metric-label">Monthly Burn</div>
      <div class="metric-value" id="total-burn">$0.00</div>
      <div class="metric-sub">active subs only</div>
    </div>
    <div class="metric proj">
      <div class="metric-label">Annual Projection</div>
      <div class="metric-value" id="annual-proj">$0.00</div>
      <div class="metric-sub">if nothing cancelled</div>
    </div>
    <div class="metric paused">
      <div class="metric-label">Paused / On Hold</div>
      <div class="metric-value" id="paused-total">$0.00</div>
      <div class="metric-sub">not counting toward burn</div>
    </div>
    <div class="metric saved">
      <div class="metric-label">Saved This Session</div>
      <div class="metric-value" id="saved">$0.00</div>
      <div class="metric-sub">cancelled subscriptions</div>
    </div>
  </div>

  <div id="savings-banner"></div>

  <div class="form-card">
    <h2>// Add Subscription</h2>
    <div class="form-row">
      <div class="field">
        <label for="svc-name">Service Name</label>
        <input id="svc-name" type="text" placeholder="e.g. Netflix" autocomplete="off"/>
      </div>
      <div class="field">
        <label for="svc-cost">Cost ($)</label>
        <input id="svc-cost" type="number" placeholder="15.00" min="0" step="0.01"/>
      </div>
      <div class="field">
        <label for="svc-cycle">Billing Cycle</label>
        <select id="svc-cycle">
          <option value="monthly">Monthly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>
      <button class="btn-add" onclick="addSub()">+ Add</button>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="mark-unused"/>
      <label for="mark-unused">Mark as unused (not used in 3+ months)</label>
    </div>
  </div>

  <div class="section-head">
    <h2>Active Subscriptions</h2>
    <div class="section-controls">
      <span class="count-badge" id="count-badge">0 subs</span>
      <button class="filter-btn" id="filter-btn" onclick="toggleFilter()">Show unused only</button>
    </div>
  </div>
  <div class="subs-list" id="subs-list" role="list"></div>

  <!-- HISTORY SECTION -->
  <div class="history-section">
    <div class="history-controls">
      <button class="filter-btn" id="history-toggle-btn" onclick="toggleHistory()">Show history</button>
    </div>
    <div id="history-panel"></div>
  </div>

</div>

<div id="toast" role="status" aria-live="polite"></div>
<script src="js.js"></script>
</body>
</html>
